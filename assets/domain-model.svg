<svg width="980" height="660" viewBox="0 0 980 660" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="rel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="660" fill="#f8fafc"/>

  <!-- TITLE -->
  <text x="490" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Modelo de Domínio — CredFlow</text>
  <text x="490" y="46" text-anchor="middle" font-size="10.5" fill="#64748b">cada serviço tem seu próprio banco PostgreSQL — sem JOINs cross-service</text>

  <!-- ══════════════════════════════════════════════
       COLUMN BACKGROUNDS
  ══════════════════════════════════════════════ -->

  <!-- account-service column bg -->
  <rect x="12" y="60" width="300" height="585" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="162" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d" letter-spacing="0.5">account-service</text>

  <!-- payment-service column bg -->
  <rect x="338" y="60" width="300" height="585" rx="12" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="488" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="0.5">payment-service</text>

  <!-- receivables-service column bg -->
  <rect x="664" y="60" width="304" height="585" rx="12" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5"/>
  <text x="816" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c" letter-spacing="0.5">receivables-service</text>

  <!-- ══════════════════════════════════════════════
       account-service MODELS
  ══════════════════════════════════════════════ -->

  <!-- Participant -->
  <rect x="26" y="94" width="272" height="118" rx="8" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <rect x="26" y="94" width="272" height="28" rx="8" fill="#16a34a"/>
  <rect x="26" y="110" width="272" height="12" fill="#16a34a"/>
  <text x="162" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="white">Participant</text>
  <text x="40" y="134" font-size="9.5" fill="#374151">role</text>
  <text x="160" y="134" font-size="9.5" fill="#6b7280">cedente | credor | sacado</text>
  <text x="40" y="150" font-size="9.5" fill="#374151">document</text>
  <text x="160" y="150" font-size="9.5" fill="#6b7280">CPF ou CNPJ (unique)</text>
  <text x="40" y="166" font-size="9.5" fill="#374151">name</text>
  <text x="160" y="166" font-size="9.5" fill="#6b7280">varchar</text>
  <text x="40" y="182" font-size="9.5" fill="#374151">kyc_status</text>
  <text x="160" y="182" font-size="9.5" fill="#6b7280">pending | approved | rejected</text>
  <text x="40" y="198" font-size="9.5" fill="#374151">kyc_checked_at</text>
  <text x="160" y="198" font-size="9.5" fill="#6b7280">timestamp</text>

  <!-- Account -->
  <rect x="26" y="228" width="272" height="148" rx="8" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <rect x="26" y="228" width="272" height="28" rx="8" fill="#16a34a"/>
  <rect x="26" y="244" width="272" height="12" fill="#16a34a"/>
  <text x="162" y="247" text-anchor="middle" font-size="11" font-weight="600" fill="white">Account</text>
  <text x="40" y="268" font-size="9.5" fill="#374151">type</text>
  <text x="160" y="268" font-size="9.5" fill="#6b7280">escrow | empresa</text>
  <text x="40" y="284" font-size="9.5" fill="#374151">cedente_id →</text>
  <text x="160" y="284" font-size="9.5" fill="#16a34a">Participant</text>
  <text x="40" y="300" font-size="9.5" fill="#374151">credor_id →</text>
  <text x="160" y="300" font-size="9.5" fill="#16a34a">Participant</text>
  <text x="40" y="316" font-size="9.5" fill="#374151">sacado_id →</text>
  <text x="160" y="316" font-size="9.5" fill="#16a34a">Participant (nullable)</text>
  <text x="40" y="332" font-size="9.5" fill="#374151">status</text>
  <text x="160" y="332" font-size="9.5" fill="#6b7280">active | blocked | closed</text>
  <text x="40" y="348" font-size="9.5" fill="#374151">policy_rules</text>
  <text x="160" y="348" font-size="9.5" fill="#6b7280">JSONB — regras do motor</text>
  <text x="40" y="364" font-size="9.5" fill="#374151">policy_rules →</text>
  <text x="160" y="364" font-size="9.5" fill="#6b7280">approval_threshold, limits...</text>

  <!-- LedgerEntry -->
  <rect x="26" y="394" width="272" height="164" rx="8" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <rect x="26" y="394" width="272" height="28" rx="8" fill="#16a34a"/>
  <rect x="26" y="410" width="272" height="12" fill="#16a34a"/>
  <text x="162" y="413" text-anchor="middle" font-size="11" font-weight="600" fill="white">LedgerEntry  ⚠ append-only</text>
  <text x="40" y="434" font-size="9.5" fill="#374151">account_id →</text>
  <text x="160" y="434" font-size="9.5" fill="#16a34a">Account</text>
  <text x="40" y="450" font-size="9.5" fill="#374151">type</text>
  <text x="160" y="450" font-size="9.5" fill="#6b7280">CREDIT_ANTECIPATION</text>
  <text x="160" y="464" font-size="9.5" fill="#6b7280">CREDIT_RECEIVED</text>
  <text x="160" y="478" font-size="9.5" fill="#6b7280">DEBIT_RESERVED / EXECUTED / REVERSED</text>
  <text x="40" y="494" font-size="9.5" fill="#374151">direction</text>
  <text x="160" y="494" font-size="9.5" fill="#6b7280">CREDIT | DEBIT</text>
  <text x="40" y="510" font-size="9.5" fill="#374151">amount_cents</text>
  <text x="160" y="510" font-size="9.5" fill="#6b7280">bigint (nunca float)</text>
  <text x="40" y="526" font-size="9.5" fill="#374151">status</text>
  <text x="160" y="526" font-size="9.5" fill="#6b7280">SETTLED | PENDING | REVERSED</text>
  <text x="40" y="542" font-size="9.5" fill="#374151">payment_order_id *</text>
  <text x="160" y="542" font-size="9.5" fill="#94a3b8">ref. soft (sem FK cross-service)</text>
  <text x="40" y="558" font-size="9.5" fill="#374151">idempotency_key</text>
  <text x="160" y="558" font-size="9.5" fill="#6b7280">varchar unique</text>

  <!-- Intra-service arrow: Participant → Account -->
  <line x1="162" y1="212" x2="162" y2="228" stroke="#64748b" stroke-width="1" marker-end="url(#rel)"/>
  <!-- Intra-service arrow: Account → LedgerEntry -->
  <line x1="162" y1="376" x2="162" y2="394" stroke="#64748b" stroke-width="1" marker-end="url(#rel)"/>

  <!-- ══════════════════════════════════════════════
       payment-service MODELS
  ══════════════════════════════════════════════ -->

  <!-- PaymentOrder -->
  <rect x="352" y="94" width="272" height="214" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <rect x="352" y="94" width="272" height="28" rx="8" fill="#7c3aed"/>
  <rect x="352" y="110" width="272" height="12" fill="#7c3aed"/>
  <text x="488" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="white">PaymentOrder</text>
  <text x="366" y="134" font-size="9.5" fill="#374151">account_id *</text>
  <text x="486" y="134" font-size="9.5" fill="#94a3b8">ref. soft → Account</text>
  <text x="366" y="150" font-size="9.5" fill="#374151">beneficiary_id *</text>
  <text x="486" y="150" font-size="9.5" fill="#94a3b8">ref. soft → Participant</text>
  <text x="366" y="166" font-size="9.5" fill="#374151">amount_cents</text>
  <text x="486" y="166" font-size="9.5" fill="#6b7280">bigint</text>
  <text x="366" y="182" font-size="9.5" fill="#374151">status</text>
  <text x="486" y="182" font-size="9.5" fill="#6b7280">draft → policy_check →</text>
  <text x="486" y="196" font-size="9.5" fill="#6b7280">pending_approval → approved →</text>
  <text x="486" y="210" font-size="9.5" fill="#6b7280">executing → settled | failed | expired</text>
  <text x="366" y="226" font-size="9.5" fill="#374151">policy_result</text>
  <text x="486" y="226" font-size="9.5" fill="#6b7280">jsonb — decisão do engine</text>
  <text x="366" y="242" font-size="9.5" fill="#374151">rejection_reason</text>
  <text x="486" y="242" font-size="9.5" fill="#6b7280">varchar nullable</text>
  <text x="366" y="258" font-size="9.5" fill="#374151">idempotency_key</text>
  <text x="486" y="258" font-size="9.5" fill="#6b7280">varchar (TTL 24h no Redis)</text>
  <text x="366" y="274" font-size="9.5" fill="#374151">expire_at</text>
  <text x="486" y="274" font-size="9.5" fill="#6b7280">timestamp — TTL de aprovação</text>
  <text x="366" y="290" font-size="9.5" fill="#374151">spb_transaction_id</text>
  <text x="486" y="290" font-size="9.5" fill="#6b7280">varchar — ref. SPB mock</text>

  <!-- Approval -->
  <rect x="352" y="326" width="272" height="118" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <rect x="352" y="326" width="272" height="28" rx="8" fill="#7c3aed"/>
  <rect x="352" y="342" width="272" height="12" fill="#7c3aed"/>
  <text x="488" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="white">Approval  ⚠ imutável</text>
  <text x="366" y="366" font-size="9.5" fill="#374151">payment_order_id →</text>
  <text x="486" y="366" font-size="9.5" fill="#7c3aed">PaymentOrder</text>
  <text x="366" y="382" font-size="9.5" fill="#374151">approver_id</text>
  <text x="486" y="382" font-size="9.5" fill="#6b7280">uuid — aprovador do credor</text>
  <text x="366" y="398" font-size="9.5" fill="#374151">decision</text>
  <text x="486" y="398" font-size="9.5" fill="#6b7280">approved | rejected</text>
  <text x="366" y="414" font-size="9.5" fill="#374151">reason</text>
  <text x="486" y="414" font-size="9.5" fill="#6b7280">text nullable</text>
  <text x="366" y="430" font-size="9.5" fill="#374151">constraint</text>
  <text x="486" y="430" font-size="9.5" fill="#6b7280">uq_approval_per_approver</text>

  <!-- Policy Engine (not a model, but a component) -->
  <rect x="352" y="462" width="272" height="90" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="488" y="482" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Policy Engine</text>
  <text x="366" y="500" font-size="9.5" fill="#5b21b6">avalia policy_rules da Account *</text>
  <text x="366" y="516" font-size="9.5" fill="#5b21b6">decide: EXECUTE | PENDING_APPROVAL</text>
  <text x="366" y="532" font-size="9.5" fill="#5b21b6">SCHEDULED | REJECTED</text>
  <text x="366" y="548" font-size="8.5" fill="#7c3aed">* lê Account via HTTP do account-service</text>

  <!-- Intra-service arrow: PaymentOrder → Approval -->
  <line x1="488" y1="308" x2="488" y2="326" stroke="#64748b" stroke-width="1" marker-end="url(#rel)"/>

  <!-- ══════════════════════════════════════════════
       receivables-service MODELS
  ══════════════════════════════════════════════ -->

  <!-- Ccb -->
  <rect x="678" y="94" width="276" height="164" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <rect x="678" y="94" width="276" height="28" rx="8" fill="#be123c"/>
  <rect x="678" y="110" width="276" height="12" fill="#be123c"/>
  <text x="816" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="white">Ccb  (Cédula de Crédito Bancário)</text>
  <text x="692" y="134" font-size="9.5" fill="#374151">cedente_id *</text>
  <text x="812" y="134" font-size="9.5" fill="#94a3b8">ref. soft → Participant</text>
  <text x="692" y="150" font-size="9.5" fill="#374151">credor_id *</text>
  <text x="812" y="150" font-size="9.5" fill="#94a3b8">ref. soft → Participant</text>
  <text x="692" y="166" font-size="9.5" fill="#374151">account_id *</text>
  <text x="812" y="166" font-size="9.5" fill="#94a3b8">ref. soft → Account</text>
  <text x="692" y="182" font-size="9.5" fill="#374151">principal_cents</text>
  <text x="812" y="182" font-size="9.5" fill="#6b7280">bigint</text>
  <text x="692" y="198" font-size="9.5" fill="#374151">discount_cents</text>
  <text x="812" y="198" font-size="9.5" fill="#6b7280">bigint — custo da antecipação</text>
  <text x="692" y="214" font-size="9.5" fill="#374151">annual_rate</text>
  <text x="812" y="214" font-size="9.5" fill="#6b7280">decimal</text>
  <text x="692" y="230" font-size="9.5" fill="#374151">installments_count</text>
  <text x="812" y="230" font-size="9.5" fill="#6b7280">integer</text>
  <text x="692" y="246" font-size="9.5" fill="#374151">status</text>
  <text x="812" y="246" font-size="9.5" fill="#6b7280">active | settled | defaulted</text>

  <!-- Installment -->
  <rect x="678" y="276" width="276" height="134" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <rect x="678" y="276" width="276" height="28" rx="8" fill="#be123c"/>
  <rect x="678" y="292" width="276" height="12" fill="#be123c"/>
  <text x="816" y="295" text-anchor="middle" font-size="11" font-weight="600" fill="white">Installment</text>
  <text x="692" y="316" font-size="9.5" fill="#374151">ccb_id →</text>
  <text x="812" y="316" font-size="9.5" fill="#be123c">Ccb</text>
  <text x="692" y="332" font-size="9.5" fill="#374151">due_date</text>
  <text x="812" y="332" font-size="9.5" fill="#6b7280">date</text>
  <text x="692" y="348" font-size="9.5" fill="#374151">amount_cents</text>
  <text x="812" y="348" font-size="9.5" fill="#6b7280">bigint</text>
  <text x="692" y="364" font-size="9.5" fill="#374151">paid_cents</text>
  <text x="812" y="364" font-size="9.5" fill="#6b7280">bigint — suporta pagamento parcial</text>
  <text x="692" y="380" font-size="9.5" fill="#374151">status</text>
  <text x="812" y="380" font-size="9.5" fill="#6b7280">pending | partially_paid | paid | overdue</text>
  <text x="692" y="396" font-size="9.5" fill="#374151">index parcial</text>
  <text x="812" y="396" font-size="9.5" fill="#6b7280">(due_date) WHERE status IN (...)</text>

  <!-- ReconciliationRun -->
  <rect x="678" y="428" width="276" height="118" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <rect x="678" y="428" width="276" height="28" rx="8" fill="#be123c"/>
  <rect x="678" y="444" width="276" height="12" fill="#be123c"/>
  <text x="816" y="447" text-anchor="middle" font-size="11" font-weight="600" fill="white">ReconciliationRun</text>
  <text x="692" y="468" font-size="9.5" fill="#374151">ran_at</text>
  <text x="812" y="468" font-size="9.5" fill="#6b7280">timestamp</text>
  <text x="692" y="484" font-size="9.5" fill="#374151">entries_checked</text>
  <text x="812" y="484" font-size="9.5" fill="#6b7280">integer</text>
  <text x="692" y="500" font-size="9.5" fill="#374151">divergences_found</text>
  <text x="812" y="500" font-size="9.5" fill="#6b7280">integer</text>
  <text x="692" y="516" font-size="9.5" fill="#374151">status</text>
  <text x="812" y="516" font-size="9.5" fill="#6b7280">running | completed | failed</text>
  <text x="692" y="532" font-size="9.5" fill="#374151">compara</text>
  <text x="812" y="532" font-size="9.5" fill="#6b7280">ledger interno × extrato SPB mock</text>

  <!-- Intra-service arrow: Ccb → Installment -->
  <line x1="816" y1="258" x2="816" y2="276" stroke="#64748b" stroke-width="1" marker-end="url(#rel)"/>

  <!-- ══════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════ -->
  <rect x="12" y="598" width="956" height="52" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="28" y="617" font-size="9.5" font-weight="600" fill="#374151">Legenda:</text>
  <line x1="80" y1="613" x2="110" y2="613" stroke="#64748b" stroke-width="1.5" marker-end="url(#rel)"/>
  <text x="115" y="617" font-size="9.5" fill="#64748b">FK intra-serviço (constraint no banco)</text>
  <text x="340" y="617" font-size="9.5" fill="#94a3b8">*  =  referência soft cross-service: ID armazenado como varchar, sem FK de banco — comunicação por HTTP ou RabbitMQ</text>
  <text x="28" y="638" font-size="9" fill="#94a3b8">⚠ append-only: LedgerEntry e Approval nunca recebem UPDATE ou DELETE — toda operação gera um novo lançamento, garantindo trilha de auditoria imutável.</text>
  <text x="28" y="650" font-size="9" fill="#94a3b8">Valores monetários sempre em bigint (centavos). Nunca float. Nunca campo "saldo" — o saldo é sempre calculado via query no ledger.</text>
</svg>
