events {
  worker_connections 1024;
}

http {
  upstream account_service  { server account-service:3000; }
  upstream payment_service  { server payment-service:3000; }
  upstream receivables_service { server receivables-service:3000; }

  server {
    listen 8080;

    # account-service: participants, accounts, ledger, auth
    location ~ ^/api/v1/(auth|participants|accounts|ledger) {
      proxy_pass http://account_service;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # payment-service: payment_orders, approvals
    location ~ ^/api/v1/(payment_orders|approvals) {
      proxy_pass http://payment_service;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # receivables-service: ccbs, installments, reconciliation, monitoring
    location ~ ^/api/v1/(ccbs|installments|reconciliation|monitoring) {
      proxy_pass http://receivables_service;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
