name: neighbry

# ── Base reutilizável (YAML anchor) ────────────────────────────────────────────

x-neighbry-api-base: &neighbry-api-base
  build:
    context: services/neighbry-api
  environment:
    DATABASE_URL: postgresql://neighbry:neighbry@postgres:5432/neighbry_api_development
    REDIS_URL: redis://redis:6379/0
    RAILS_ENV: development
    RAILS_LOG_TO_STDOUT: "true"
    SECRET_KEY_BASE: dev_secret_key_base_neighbry_api_changeme
    DEVISE_JWT_SECRET_KEY: dev_jwt_secret_key_changeme_in_production
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - ./services/neighbry-api:/app
    - bundle-neighbry-api:/usr/local/bundle

services:

  # ── Infraestrutura ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: neighbry
      POSTGRES_PASSWORD: neighbry
      POSTGRES_DB: neighbry_api_development
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neighbry -d neighbry_api_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend — API ────────────────────────────────────────────────────────────

  neighbry-api:
    <<: *neighbry-api-base
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    ports:
      - "3001:3000"

  # ── Backend — Jobs (Sidekiq) ─────────────────────────────────────────────────

  sidekiq:
    <<: *neighbry-api-base
    command: bundle exec sidekiq

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
      - node_modules-frontend:/app/node_modules

volumes:
  pgdata:
  bundle-neighbry-api:
  node_modules-frontend:
