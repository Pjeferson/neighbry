name: credflow

# ── Bases reutilizáveis (YAML anchors) ────────────────────────────────────────

x-account-base: &account-base
  build:
    context: services/account-service
  environment:
    DATABASE_URL: postgresql://credflow:credflow@postgres-account:5432/account_service_development
    REDIS_URL: redis://redis:6379/0
    RABBITMQ_URL: amqp://credflow:credflow@rabbitmq:5672
    KYC_MOCK_URL: http://kyc-mock:4002
    RAILS_ENV: development
    RAILS_LOG_TO_STDOUT: "true"
    SECRET_KEY_BASE: dev_secret_key_base_account_service_changeme
    DEVISE_JWT_SECRET_KEY: dev_jwt_secret_key_changeme_in_production
    INTERNAL_SERVICE_KEY: credflow-internal
  depends_on:
    postgres-account:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  volumes:
    - ./services/account-service:/app
    - bundle-account:/usr/local/bundle

x-payment-base: &payment-base
  build:
    context: services/payment-service
  environment:
    DATABASE_URL: postgresql://credflow:credflow@postgres-payment:5432/payment_service_development
    REDIS_URL: redis://redis:6379/1
    RABBITMQ_URL: amqp://credflow:credflow@rabbitmq:5672
    SPB_MOCK_URL: http://spb-mock:4001
    ACCOUNT_SERVICE_URL: http://account-service:3000
    DEVISE_JWT_SECRET_KEY: dev_jwt_secret_key_changeme_in_production
    INTERNAL_SERVICE_KEY: credflow-internal
    RAILS_ENV: development
    RAILS_LOG_TO_STDOUT: "true"
    SECRET_KEY_BASE: dev_secret_key_base_payment_service_changeme
  depends_on:
    postgres-payment:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  volumes:
    - ./services/payment-service:/app
    - bundle-payment:/usr/local/bundle

x-receivables-base: &receivables-base
  build:
    context: services/receivables-service
  environment:
    DATABASE_URL: postgresql://credflow:credflow@postgres-receivables:5432/receivables_service_development
    REDIS_URL: redis://redis:6379/2
    RABBITMQ_URL: amqp://credflow:credflow@rabbitmq:5672
    RABBITMQ_MANAGEMENT_URL: http://rabbitmq:15672
    RABBITMQ_MANAGEMENT_USER: credflow
    RABBITMQ_MANAGEMENT_PASS: credflow
    SPB_MOCK_URL: http://spb-mock:4001
    BOLETO_MOCK_URL: http://boleto-mock:4003
    ACCOUNT_SERVICE_URL: http://account-service:3000
    RAILS_ENV: development
    RAILS_LOG_TO_STDOUT: "true"
    SECRET_KEY_BASE: dev_secret_key_base_receivables_service_changeme
    DEVISE_JWT_SECRET_KEY: dev_jwt_secret_key_changeme_in_production
    INTERNAL_SERVICE_KEY: credflow-internal
  depends_on:
    postgres-receivables:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  volumes:
    - ./services/receivables-service:/app
    - bundle-receivables:/usr/local/bundle

services:

  # ── Infraestrutura ──────────────────────────────────────────────────────────

  postgres-account:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: credflow
      POSTGRES_PASSWORD: credflow
      POSTGRES_DB: account_service_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata-account:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credflow -d account_service_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: credflow
      POSTGRES_PASSWORD: credflow
      POSTGRES_DB: payment_service_development
    ports:
      - "5433:5432"
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credflow -d payment_service_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-receivables:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: credflow
      POSTGRES_PASSWORD: credflow
      POSTGRES_DB: receivables_service_development
    ports:
      - "5434:5432"
    volumes:
      - pgdata-receivables:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credflow -d receivables_service_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: credflow
      RABBITMQ_DEFAULT_PASS: credflow
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── Mocks ───────────────────────────────────────────────────────────────────

  kyc-mock:
    build:
      context: mocks/kyc-mock
    ports:
      - "4002:4002"

  spb-mock:
    build:
      context: mocks/spb-mock
    ports:
      - "4001:4001"
    volumes:
      - spb_data:/app/db

  boleto-mock:
    build:
      context: mocks/boleto-mock
    ports:
      - "4003:4003"

  # ── Serviços Rails — API ─────────────────────────────────────────────────────

  account-service:
    <<: *account-base
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    ports:
      - "3001:3000"

  payment-service:
    <<: *payment-base
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    ports:
      - "3002:3000"

  receivables-service:
    <<: *receivables-base
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    ports:
      - "3003:3000"

  # ── Serviços Rails — Jobs (Solid Queue) ──────────────────────────────────────

  payment-jobs:
    <<: *payment-base
    command: bundle exec rails solid_queue:start

  receivables-jobs:
    <<: *receivables-base
    command: bundle exec rails solid_queue:start

  # ── Serviços Rails — Consumers (RabbitMQ / Sneakers) ─────────────────────────

  account-consumer:
    <<: *account-base
    command: bundle exec sneakers work PaymentSettledConsumer,PaymentFailedConsumer,PaymentFailedNotificationConsumer,ApprovalRequestedConsumer --require ./config/environment.rb

  receivables-consumer:
    <<: *receivables-base
    command: bundle exec sneakers work PaymentSettledConsumer --require ./config/environment.rb

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - node_modules-frontend:/app/node_modules

  # ── Playwright E2E (profile: e2e) ───────────────────────────────────────────

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /app
    network_mode: host
    volumes:
      - ./frontend:/app
      - node_modules-frontend:/app/node_modules
    profiles: ["e2e"]
    command: npx playwright test

  # ── API Gateway ─────────────────────────────────────────────────────────────

  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - account-service
      - payment-service
      - receivables-service

volumes:
  pgdata-account:
  pgdata-payment:
  pgdata-receivables:
  bundle-account:
  bundle-payment:
  bundle-receivables:
  node_modules-frontend:
  spb_data:
